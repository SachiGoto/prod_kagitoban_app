version: 1
backend:
  phases:
    build:
      commands:
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf flutter
        - git clone https://github.com/flutter/flutter.git -b 3.19.3 --depth 1
        - export PATH="$PWD/flutter/bin:$PATH"
        - flutter --version
        - flutter config --enable-web
        - flutter pub get
    build:
      commands:
        - export PATH="$PWD/flutter/bin:$PATH"
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - "**/*"
  cache:
    paths:
      - .pub-cache
